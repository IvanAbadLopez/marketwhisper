name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          # DATABASE_URL needed for Prisma schema validation
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test -- --run
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Build Next.js app
        run: npm run build
        env:
          # Dummy values for build (no database needed for static analysis)
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-build-secret-key-not-for-production

  # Security audit: Fails CI if high/critical vulnerabilities detected
  # Run manually: npm audit --audit-level=high
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint-test-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Check for vulnerable dependencies
        run: |
          echo "Checking for high/critical vulnerabilities..."
          if npm audit --audit-level=high --json | jq -e '.metadata.vulnerabilities.high > 0 or .metadata.vulnerabilities.critical > 0' > /dev/null; then
            echo "❌ High or critical vulnerabilities found!"
            exit 1
          else
            echo "✅ No high or critical vulnerabilities found"
          fi

  e2e-tests:
    runs-on: ubuntu-latest
    # E2E tests run only when DATABASE_URL_CI secret is configured
    # To enable: Add DATABASE_URL_CI secret in GitHub repo settings
    if: ${{ secrets.DATABASE_URL_CI != '' }}
    needs: lint-test-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-e2e-secret-key-not-for-production
          DATABASE_URL: ${{ secrets.DATABASE_URL_CI }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
