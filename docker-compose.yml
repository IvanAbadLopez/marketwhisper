services:
  # PostgreSQL Database
  db:
    image: pgvector/pgvector:pg16
    container_name: marketwhisper-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: marketwhisper
      POSTGRES_PASSWORD: marketwhisper_dev_2026
      POSTGRES_DB: marketwhisper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh
      - ./prisma/docker-init/02-schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
      - ./prisma/docker-init/03-seed.sql:/docker-entrypoint-initdb.d/03-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketwhisper"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://marketwhisper:marketwhisper_dev_2026@db:5432/marketwhisper
        NEXTAUTH_URL: http://localhost:3000
        NEXTAUTH_SECRET: docker-dev-secret-change-in-production-please
    container_name: marketwhisper-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://marketwhisper:marketwhisper_dev_2026@db:5432/marketwhisper
      
      # Fix for corporate proxy with self-signed certificates
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      
      # NextAuth.js
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: docker-dev-secret-change-in-production-please
      AUTH_TRUST_HOST: "true"
      
      # Optional: APIs
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      
      # Enrichment service URLs
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      ENRICHMENT_SERVICE_URL: http://enrichment:8001
    depends_on:
      db:
        condition: service_healthy

  # Ollama - Local LLM for AI analysis
  ollama:
    image: ollama/ollama:latest
    container_name: marketwhisper-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Fix for corporate proxy with self-signed certificates
      GODEBUG: x509ignoreCN=0,http2client=0
      GIT_SSL_NO_VERIFY: "true"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      HTTPS_PROXY: ""
      HTTP_PROXY: ""
      NO_PROXY: "*"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Enrichment Service - Python FastAPI for Finnhub data fetching
  enrichment:
    build:
      context: ./services/enrichment
      dockerfile: Dockerfile
    container_name: marketwhisper-enrichment
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PYTHONHTTPSVERIFY: "0"
      REQUESTS_CA_BUNDLE: ""
      CURL_CA_BUNDLE: ""
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  ollama_data:
    driver: local
